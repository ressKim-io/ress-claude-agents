name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bats shellcheck

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Run BATS tests
        run: bats tests/install.bats

  docs:
    name: Documentation Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Validate documentation consistency
        run: ./scripts/generate-docs.sh validate

  inventory:
    name: Inventory Freshness
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate inventory freshness
        run: ./scripts/generate-inventory.sh validate

  lint:
    name: Shellcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck on install.sh
        run: shellcheck install.sh

      - name: Run shellcheck on scripts
        run: shellcheck scripts/*.sh

  drift:
    name: Rules / Frontmatter / Adapter Drift
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate AGENTS.md ↔ rules drift
        run: ./scripts/validate-rules-drift.sh all

      - name: Validate skill/agent frontmatter
        run: ./scripts/validate-skill-frontmatter.sh all

      - name: Validate inventory labels freshness
        run: ./scripts/generate-inventory-labels.sh validate

      - name: Validate agent handoff (P3 위계)
        run: ./scripts/validate-agent-handoff.sh all

      - name: Setup Node (for control-plane adapter)
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: control-plane/package-lock.json

      - name: Install control-plane dependencies
        working-directory: control-plane
        run: npm ci

      - name: Build control-plane
        working-directory: control-plane
        run: npm run build

      - name: Adapter parity drift (P4 — codex + cursor only; .claude/skills SKILL.md is gitignored until P7)
        run: |
          for tool in codex cursor; do
            echo "=== adapter --tool=$tool ==="
            node control-plane/dist/cli.js adapter \
              --tool="$tool" \
              --root="$PWD" \
              --assets="$PWD/assets"
          done
          if ! git diff --quiet -- .codex/skills/ .codex/agents/ .cursor/; then
            echo "::error::adapter parity drift detected. Run locally:"
            echo "  cd control-plane && npm run build && cd .."
            echo "  for t in codex cursor; do node control-plane/dist/cli.js adapter --tool=\$t --root=. --assets=./assets; done"
            echo "Then commit the regenerated view files."
            git diff --stat -- .codex/skills/ .codex/agents/ .cursor/
            exit 1
          fi
