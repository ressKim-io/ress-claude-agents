      lines: 534
      title: "MSA Architect Agent"
      desc: "MSA 아키텍처 설계 에이전트. 서비스 경계 정의, API 계약(protobuf/OpenAPI) 설계, Bounded Context 매핑, 의존성 분석에 특화. Use for microservice architecture design, service decomposition, and API contract definition."
