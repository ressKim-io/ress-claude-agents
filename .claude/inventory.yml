    - name: ci-optimizer
      lines: 430
      title: "CI Optimizer Agent"
      desc: "CI/CD 파이프라인 분석 및 최적화 에이전트. 빌드 시간 분석, 병목 지점 식별, DORA 메트릭 추적, Flaky 테스트 탐지. Use when CI is slow, builds are failing, or you need pipeline optimization."
