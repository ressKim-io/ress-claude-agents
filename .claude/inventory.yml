      desc: "AI-powered CI/CD pipeline reviewer. Use PROACTIVELY after GitHub Actions workflow or GitLab CI changes to catch security, supply chain, cost, and best practice issues. Provides Category Budget scoring."
    - name: cicd-security-reviewer
      lines: 418
      title: "CI/CD Security Reviewer (Attack Surface Focus)"
      desc: "Attack surface-focused CI/CD security reviewer. OWASP Top 10 CI/CD Risks + SLSA framework 기반. Pipeline poisoning, secret exfiltration, supply chain 공격을 공격자 관점에서 엄격히 검증한다."
    - name: git-workflow
      lines: 454
      title: "Git Workflow Agent"
      desc: "Git 워크플로우 자동화 에이전트. 커밋 메시지 생성, PR 자동화, Changelog 생성, 브랜치 전략 가이드. Use PROACTIVELY when committing, creating PRs, or preparing releases."
