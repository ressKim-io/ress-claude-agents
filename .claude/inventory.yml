agents:
  architecture:
    - name: architect-agent
      lines: 535
      title: "MSA Architect Agent"
      desc: "MSA 아키텍처 설계 에이전트. 서비스 경계 정의, API 계약(protobuf/OpenAPI) 설계, Bounded Context 매핑, 의존성 분석에 특화. Use for microservice architecture design, service decomposition, and API contract definition. compliance-strategy-agent의 compliance-blueprint를 consume하여 data-model에 규제 제약(PIPA/GDPR) 반영. business-decision-agent의 4 ADR(tenancy/auth/payment/notification)을 consume하여 api-contract 설계."
    - name: saga-agent
      lines: 493
      title: "Saga Agent - 분산 트랜잭션 오케스트레이션"
      desc: "분산 트랜잭션 오케스트레이션 에이전트. Saga 패턴 설계, Temporal.io 워크플로우, 보상 트랜잭션, 멱등성 보장에 특화. Use for distributed transaction orchestration, Temporal workflows, and compensation logic."
  cicd:
    - name: ci-optimizer
      lines: 430
      title: "CI Optimizer Agent"
      desc: "CI/CD 파이프라인 분석 및 최적화 에이전트. 빌드 시간 분석, 병목 지점 식별, DORA 메트릭 추적, Flaky 테스트 탐지. Use when CI is slow, builds are failing, or you need pipeline optimization."
    - name: cicd-reviewer
      lines: 450
      title: "CI/CD Pipeline Reviewer"
      desc: "CI/CD 파이프라인 종합 리뷰어 — 비용, 캐싱, 권한 범위, 작업 구조, 시크릿 관리 best practice. Use PROACTIVELY when GitHub Actions / GitLab CI workflow files change. 공격자 관점 보안 검증(OWASP CICD Top 10, SLSA, pipeline poisoning)은 cicd-security-reviewer를 함께 호출."
    - name: cicd-security-reviewer
      lines: 418
      title: "CI/CD Security Reviewer (Attack Surface Focus)"
      desc: "CI/CD 공격 표면 전문 리뷰어 — OWASP Top 10 CI/CD Risks + SLSA framework. Pipeline poisoning, secret exfiltration, supply chain compromise를 공격자 관점에서 검증. Use when 보안 audit 또는 공격 시나리오 검증이 필요할 때. 비용/캐싱/best practice 같은 일반 검증은 cicd-reviewer 사용."
    - name: git-workflow
      lines: 496
      title: "Git Workflow Agent"
      desc: "Git 워크플로우 자동화 에이전트. 커밋 메시지 생성, PR 자동화, Changelog 생성, 브랜치 전략 가이드. Use PROACTIVELY when committing, creating PRs, or preparing releases."
    - name: gitops-reviewer
      lines: 461
      title: "GitOps Configuration Reviewer"
      desc: "AI-powered GitOps configuration reviewer. Use PROACTIVELY after ArgoCD Application, Flux Kustomization, or Helm values changes to catch sync, drift, security, and environment isolation issues. Provides Category Budget scoring."
    - name: pr-review-bot
      lines: 486
      title: "PR Review Bot Agent"
      desc: "AI PR 자동 리뷰 설정 및 운영 에이전트. GitHub Copilot, CodeRabbit, Claude Code Action 설정 가이드. Use when setting up automated PR reviews or troubleshooting review bots."
  database:
    - name: database-expert
      lines: 311
      title: "PostgreSQL Expert Agent"
      desc: "PostgreSQL 전문가 에이전트. PostgreSQL 성능 튜닝, PgBouncer, Streaming Replication, Kubernetes PostgreSQL 운영에 특화. Use for PostgreSQL optimization, query tuning, and PgBouncer configuration. MySQL은 database-expert-mysql 에이전트 참조."
    - name: database-expert-mysql
      lines: 287
      title: "MySQL Expert Agent"
      desc: "MySQL/InnoDB 전문가 에이전트. InnoDB 튜닝, ProxySQL, MySQL HA, Kubernetes MySQL 운영에 특화. Use for MySQL optimization, ProxySQL configuration, and MySQL HA architecture."
    - name: redis-expert
      lines: 372
      title: "Redis Expert Agent"
      desc: "Redis 전문가 에이전트. Redis Cluster, Sentinel HA, 캐싱 전략, Lua 스크립트, Kubernetes Redis 운영에 특화. Use for Redis optimization, cluster design, and caching patterns."
  devops:
    - name: business-decision-agent
      lines: 319
      title: "Business Decision Agent"
      desc: "신규 SaaS 부트스트랩의 4 ADR 일관성 orchestration 에이전트 — 멀티테넌시, 인증 Provider, 결제 Provider, 알림 채널 결정을 순서대로 수행해 일관된 ADR set을 produce. 한국 B2C 시장(Kakao 로그인 / PortOne·Toss 결제 / 카카오톡 알림톡 / PIPA) 가중치 내장. Use when 새 프로젝트 0→1 단계의 비즈니스 도메인 결정 / 신규 도메인의 격리·인증·결제·알림 ADR 작성이 필요할 때. 전사 RFC governance나 Tech Radar는 tech-lead 사용."
    - name: code-reviewer
      lines: 416
      title: "Code Reviewer Agent"
      desc: "Cross-language 시니어 코드 리뷰어 — correctness, readability, 명명, 중복, 테스트 커버리지, 일반 best practice. Use PROACTIVELY after any code change as the default reviewer. 언어 특화 깊은 검증(Go concurrency, Java JVM/Virtual Threads, Python asyncio, React Server Components)은 go-/java-/python-/frontend-expert를 함께 호출."
    - name: debugging-expert
      lines: 452
      title: "Debugging Expert Agent"
      desc: "Cascade failure 분석 / cross-service 디버깅 전문가 — 의존성 그래프 매핑, blast radius 추적, 타임라인 상관분석으로 근본 원인 식별. Use when 분산 시스템 장애 / 다중 서비스 cascade 실패 / cross-service 타임아웃·에러가 발생할 때. 단일 서비스 디버깅은 일반 expert 또는 k8s-troubleshooter 사용."
    - name: dev-logger
      lines: 171
      title: "Dev Logger Agent"
      desc: "개발 과정 기록 에이전트. AI 수정 요청(feedback), 아키텍처 결정(decision), 시스템 개선(meta), 트러블슈팅(trouble) 기록을 구조화된 마크다운으로 저장. Use when /log-* commands are invoked."
    - name: migration-expert
      lines: 598
      title: "Migration Expert Agent"
      desc: "프레임워크, 언어, DB, 인프라 버전 업그레이드 전문 에이전트. 위험 평가, 계획 수립, 단계별 실행, 검증까지 마이그레이션 전체 사이클 지원. Use for framework/db/k8s version upgrades and migration planning."
    - name: product-engineer
      lines: 477
      title: "Product Engineer Agent"
      desc: "요구사항 분석, 유저스토리 작성, 우선순위 결정, MVP 스코핑 에이전트. 비즈니스 목표와 기술 구현 사이의 번역자. Use for requirements engineering, prioritization, and product strategy."
    - name: tech-lead
      lines: 586
      title: "Tech Lead Agent"
      desc: "기술 전략 수립, RFC/ADR 주도, 팀 오케스트레이션 에이전트. Claude Code Team의 리더 역할. Use for strategic technical decisions, RFC/ADR workflow, and team orchestration. 새 프로젝트의 tenancy/auth/payment/notification 4 ADR orchestration은 business-decision-agent로 위임. 본 agent는 전사 governance / Tech Radar / Build vs Buy 결정에 집중."
    - name: ticketing-expert
      lines: 276
      title: "Ticketing Expert Agent"
      desc: "대규모 티켓팅 플랫폼 아키텍처 에이전트. Virtual Waiting Room, Redis 대기열, 좌석 잠금, Saga 패턴에 특화. Use for high-traffic ticketing systems handling 1M+ concurrent users."
  finops:
    - name: cost-analyzer
      lines: 384
      title: "Cost Analyzer Agent"
      desc: "AI-powered FinOps cost analyzer. Use to analyze cloud spending, identify optimization opportunities, detect anomalies, and provide actionable cost reduction recommendations."
    - name: finops-advisor
      lines: 357
      title: "FinOps Advisor Agent"
      desc: "FinOps 전략 조언자 에이전트. FinOps Foundation Framework 기반 성숙도 평가, 도구 선택, Unit Economics, GreenOps 통합에 특화. Use for cloud cost strategy, maturity assessment, and tool selection."
