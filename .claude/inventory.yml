    - name: frontend-expert
      lines: 283
      title: "Frontend Expert Agent"
      desc: "Frontend 전문가 — React 19+, Next.js 15 App Router, React Server Components, React Compiler, Core Web Vitals, 접근성, Vitest/Playwright. Use when frontend-specific Server/Client component 경계 / 성능 / 접근성 검증이 필요할 때. 일반 코드 품질(가독성, 테스트, 명명, 중복)은 code-reviewer 사용. 두 agent 함께 호출 시 frontend 특화 영역은 frontend-expert 결과 우선."
  go:
    - name: go-expert
      lines: 605
      title: "Go Expert Agent"
