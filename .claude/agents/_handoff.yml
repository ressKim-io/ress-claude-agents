# Agent Handoff Definitions
#
# 모든 agent의 produces/consumes를 단일 파일에 통합 정의한다.
# - workflow는 이 정의를 참조해 핸드오프가 valid한지 검증
# - 새 agent 추가 시 이 파일에 항목 추가 + lint 통과
# - 변경 시 scripts/validate-agent-handoff.sh로 검증
#
# 설계 원칙:
#   1. artifact는 명사 (user-story, k8s-manifest), 동사 X
#   2. agent는 produces 한 artifact를 다음 단계 agent가 consume
#   3. 외부 입력(idea, requirement-change)은 produces에 안 나옴
#   4. 모든 agent가 _handoff.yml에 등록되어야 한다 (lint 강제)

# ---------------------------------------------------------------------------
# Artifact Vocabulary
# ---------------------------------------------------------------------------
# 산출물 타입 정의. agent의 produces/consumes에서 이 vocabulary만 사용 가능.
# 새 artifact 타입은 명사 단수형, kebab-case.
artifacts:

  # 외부 입력 (workflow의 시작점)
  idea: "비즈니스 아이디어, 마켓 시그널, 사용자 요청"
  requirement-change: "기존 요구사항 변경 트리거"
  alert: "Prometheus/모니터링 알림 발화"
  ci-failure: "CI/CD 파이프라인 실패 신호"

  # 기획/요구사항 단계
  user-story: "사용자 스토리 (As a / I want / So that)"
  acceptance-criteria: "수락 기준 (Given/When/Then)"
  mvp-scope: "MVP 범위 정의 + 비기능 요구사항"

  # 설계 단계
  bounded-context: "DDD bounded context 매핑"
  service-boundary: "서비스 경계 + 데이터 소유권"
  api-contract: "OpenAPI / gRPC protobuf / GraphQL schema"
  data-model: "ERD, 도메인 엔터티 모델"

  # 의사결정 단계
  rfc: "Request for Comments (설계 제안 + 합의)"
  adr: "Architecture Decision Record (결정 + 트레이드오프)"
  tech-radar-entry: "Tech Radar Adopt/Trial/Assess/Hold 항목"

  # 구현 단계
  code: "소스 코드 + 변경 (PR 형태)"
  unit-test: "단위 테스트"
  integration-test: "통합 테스트 (TestContainers 등)"

  # 인프라 단계
  helm-chart: "Helm chart + values"
  k8s-manifest: "K8s manifest (Deployment/Service/etc.)"
  terraform-module: "Terraform / OpenTofu 모듈"
  dockerfile: "Dockerfile / docker-compose.yml"
  ci-pipeline: "GitHub Actions / GitLab CI 워크플로우"
  gitops-config: "ArgoCD Application / Flux Kustomization"

  # 운영 산출물
  runbook: "장애 대응 / 운영 절차서"
  dashboard: "Grafana 대시보드 JSON"
  alert-rule: "Prometheus rule (PromQL)"
  slo-definition: "SLI/SLO + error budget 정의"

  # 리뷰 산출물
  code-review-comment: "PR 코드 리뷰 코멘트 (멀티 관점)"
  security-finding: "보안 취약점 보고 (severity + CWE)"
  compliance-report: "SOC2/PCI/HIPAA/GDPR 감사 보고"

  # 사고/회고 산출물
  incident-report: "초기 인시던트 보고 (영향 + 타임라인)"
  root-cause-analysis: "RCA (5 Whys + 가설 검증)"
  postmortem: "Blameless 포스트모템 + action items"
  action-items: "후속 조치 (P0/P1/P2 + owner + 기한)"

  # 비용/성능
  cost-report: "FinOps 비용 분석 + Unit Economics"
  load-test-report: "부하 테스트 결과 (p50/p95/p99 + SLO 판정)"
  performance-report: "성능 분석 + 병목 식별"

  # 마이그레이션
  migration-plan: "마이그레이션 단계별 계획 + rollback"
  upgrade-plan: "버전 업그레이드 계획 (호환성 매트릭스)"

  # Git/PR
  pr: "Pull Request (Conventional Commits + body)"
  commit: "Git commit"
  changelog: "CHANGELOG.md 항목"

  # 기록
  dev-log: "개발 기록 (feedback / decision / meta / trouble)"

# ---------------------------------------------------------------------------
# Agent Handoff (46 agents)
# ---------------------------------------------------------------------------
# 각 agent의 입력/출력 artifact. workflow는 이 매핑으로 핸드오프 검증.

agents:

  # === 기획/요구사항 ===
  product-engineer:
    consumes: [idea, requirement-change]
    produces: [user-story, acceptance-criteria, mvp-scope]

  # === 전략/의사결정 ===
  tech-lead:
    consumes: [user-story, bounded-context, mvp-scope]
    produces: [rfc, adr, tech-radar-entry]

  # === 설계 ===
  architect-agent:
    consumes: [user-story, acceptance-criteria, mvp-scope]
    produces: [bounded-context, service-boundary, api-contract, data-model]

  ticketing-expert:
    consumes: [user-story, mvp-scope]
    produces: [bounded-context, api-contract, runbook]

  saga-agent:
    consumes: [bounded-context, api-contract]
    produces: [code, runbook]

  infra-roadmap-planner:
    consumes: [bounded-context, mvp-scope]
    produces: [migration-plan, upgrade-plan]

  # === 언어별 구현 ===
  go-expert:
    consumes: [api-contract, adr, acceptance-criteria]
    produces: [code, unit-test, integration-test, code-review-comment]

  java-expert:
    consumes: [api-contract, adr, acceptance-criteria]
    produces: [code, unit-test, integration-test, code-review-comment]

  python-expert:
    consumes: [api-contract, adr, acceptance-criteria]
    produces: [code, unit-test, integration-test, code-review-comment]

  frontend-expert:
    consumes: [api-contract, acceptance-criteria]
    produces: [code, unit-test, code-review-comment]

  # === 인프라/플랫폼 ===
  platform-engineer:
    consumes: [user-story, acceptance-criteria, bounded-context]
    produces: [helm-chart, k8s-manifest, gitops-config]

  mlops-expert:
    consumes: [api-contract, code]
    produces: [helm-chart, k8s-manifest, dashboard]

  service-mesh-expert:
    consumes: [k8s-manifest, bounded-context]
    produces: [k8s-manifest, code-review-comment]

  messaging-expert:
    consumes: [api-contract, bounded-context]
    produces: [code, runbook, code-review-comment]

  otel-expert:
    consumes: [code, k8s-manifest]
    produces: [dashboard, alert-rule, slo-definition]

  database-expert:
    consumes: [data-model, code]
    produces: [code-review-comment, migration-plan, runbook]

  database-expert-mysql:
    consumes: [data-model, code]
    produces: [code-review-comment, migration-plan, runbook]

  redis-expert:
    consumes: [code, k8s-manifest]
    produces: [code-review-comment, runbook]

  # === 리뷰어 (post-implementation) ===
  code-reviewer:
    consumes: [pr, code]
    produces: [code-review-comment]

  k8s-reviewer:
    consumes: [k8s-manifest, helm-chart]
    produces: [code-review-comment]

  terraform-reviewer:
    consumes: [terraform-module]
    produces: [code-review-comment]

  dockerfile-reviewer:
    consumes: [dockerfile]
    produces: [code-review-comment]

  gitops-reviewer:
    consumes: [gitops-config]
    produces: [code-review-comment]

  observability-reviewer:
    consumes: [alert-rule, dashboard, slo-definition]
    produces: [code-review-comment]

  cicd-reviewer:
    consumes: [ci-pipeline]
    produces: [code-review-comment]

  pr-review-bot:
    consumes: [pr]
    produces: [code-review-comment]

  # === 보안 리뷰어 (security-finding 산출) ===
  security-scanner:
    consumes: [code, dockerfile]
    produces: [security-finding]

  container-security-reviewer:
    consumes: [dockerfile]
    produces: [security-finding]

  k8s-security-reviewer:
    consumes: [k8s-manifest, helm-chart]
    produces: [security-finding]

  network-security-reviewer:
    consumes: [k8s-manifest]
    produces: [security-finding]

  cicd-security-reviewer:
    consumes: [ci-pipeline]
    produces: [security-finding]

  anti-bot:
    consumes: [code, k8s-manifest, alert]
    produces: [k8s-manifest, runbook, code-review-comment]

  compliance-auditor:
    consumes: [code, k8s-manifest, terraform-module, ci-pipeline]
    produces: [compliance-report, action-items]

  # === 운영 / 인시던트 ===
  incident-responder:
    consumes: [alert, dashboard]
    produces: [incident-report]

  debugging-expert:
    consumes: [incident-report, code, alert]
    produces: [root-cause-analysis]

  k8s-troubleshooter:
    consumes: [k8s-manifest, alert]
    produces: [root-cause-analysis, runbook]

  dev-logger:
    consumes: [adr, incident-report, root-cause-analysis, code-review-comment]
    produces: [dev-log, postmortem]

  # === CI/CD 최적화 ===
  ci-optimizer:
    consumes: [ci-pipeline, ci-failure]
    produces: [performance-report, code-review-comment]

  git-workflow:
    consumes: [code]
    produces: [commit, pr, changelog]

  # === 부하/성능 테스트 ===
  load-tester:
    consumes: [api-contract, code]
    produces: [load-test-report]

  load-tester-k6:
    consumes: [api-contract, code]
    produces: [load-test-report]

  load-tester-gatling:
    consumes: [api-contract, code]
    produces: [load-test-report]

  load-tester-ngrinder:
    consumes: [api-contract, code]
    produces: [load-test-report]

  # === FinOps ===
  cost-analyzer:
    consumes: [terraform-module, k8s-manifest, helm-chart]
    produces: [cost-report]

  finops-advisor:
    consumes: [cost-report]
    produces: [adr, action-items, tech-radar-entry]

  # === 마이그레이션 ===
  migration-expert:
    consumes: [code, k8s-manifest, dockerfile, terraform-module]
    produces: [migration-plan, upgrade-plan, action-items]
