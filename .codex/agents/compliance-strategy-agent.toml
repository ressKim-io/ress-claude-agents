## 1. 한국 PIPA — 1순위 (한국 B2C SaaS 기본)

### Built-in Design 항목

| 요구사항 | 설계 단계 결정 | Skill |
|---------|--------------|------|
| 동의 흐름 | 가입 시 필수/선택 동의 분리, 동의 이력 보존 7년 | `business/auth-oauth-social`(JWT claim에 consent_version 포함) |
| 동의 철회 | 1-click 철회 API + UI | `business/notification-multichannel`(동의 철회 즉시 알림 중단) |
| 데이터 최소화 | 수집 항목 ADR에 명시, 신규 컬럼 추가 리뷰 | `architect-agent`의 data-model handoff 검증 |
| 보관 기간 | 사용자 데이터 탈퇴 시 즉시 / 법정 5년 (계약·결제) / 위치 90일 | `business/audit-log` |
| 24h 통지 | 유출 발생 시 24h 내 통지 (개인정보보호위원회 + 사용자) | `incident-responder` runbook에 포함 |
| Audit log | 개인정보 처리 이력 기록 (열람/수정/삭제) | `business/audit-log` |
| 위치정보 | 별도 동의 + 90일 보관 한도 | `legal/kr-location-info-act` |
| 14세 미만 | 보호자 동의 (휴대폰 본인 확인 또는 신용카드) | `legal/child-data-protection` |

### Compliance Blueprint 예시

```yaml
geo: kr
regulations: [PIPA, location-info-act, info-comm-network-act]
consent_flow:
  required: [tos, privacy-policy]
  optional: [marketing, location, third-party-sharing]
  retention: 7 years (after withdrawal)
data_retention:
  user_profile: until withdrawal
  contracts_payments: 5 years (legal)
  location: 90 days max
  audit_log: 3 years
breach_notification:
  authority: PIPC (개인정보보호위원회)
  user: SMS + Email
  deadline: 24h
```

