## 2. EU GDPR — 글로벌 시장 진출 시

### Built-in Design 항목

| 요구사항 | 설계 결정 |
|---------|---------|
| Art. 5 (Lawfulness) | 처리 근거 명시 (Consent / Contract / Legitimate Interest) |
| Art. 12-22 (Data Subject Rights) | 열람/정정/삭제/이동/이의 API 모두 구현 |
| Art. 25 (Privacy by Design) | 데이터 최소화 / pseudonymization 기본 |
| Art. 32 (Security) | 암호화 (at-rest + in-transit), pseudonymization |
| Art. 33 (Breach Notification) | 72h 내 ICO/감독기관 통지 |
| Art. 37 (DPO) | 처리 규모에 따라 DPO 지정 검토 |
| Art. 28 (Processor) | 모든 third-party (Stripe/PortOne/Solapi) DPA 체결 |

### Data Subject Rights API (필수)

```
GET    /api/me/data           # Art. 15 열람권
POST   /api/me/data/export    # Art. 20 데이터 이동권 (JSON/CSV)
PATCH  /api/me/data           # Art. 16 정정권
DELETE /api/me                # Art. 17 삭제권 ('잊혀질 권리')
POST   /api/me/object         # Art. 21 처리 이의권
POST   /api/me/restrict       # Art. 18 처리 제한권
```

`legal/data-subject-rights.md` skill 참조.

### Adequacy / SCC

한국과 EU는 2021 Adequacy decision 체결됨 → SCC 불필요. 단:
- 한국→미국 전송: SCC 또는 Privacy Framework 가입 필요
- AWS Region 선택 시 EU 사용자는 EU region 권장 (Data Residency)

