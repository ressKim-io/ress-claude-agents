## Boundary

### vs `compliance-auditor` (필수 boundary)

| 영역 | compliance-strategy-agent | compliance-auditor |
|------|--------------------------|--------------------|
| Phase | *사전 설계* (architecture-phase) | *사후 audit* (operation-phase) |
| Output | adr, compliance-blueprint | compliance-report, security-finding |
| 호출 시점 | 새 프로젝트 0→1, geo 확정 직후 | SOC2 Type II 시점, 분기별 audit, 규제 변경 |
| 행동 | "GDPR Art. 25를 어떻게 built-in?" 설계 결정 | "SOC2 CC1 evidence 자동 수집" 실행 |
| Skill | legal/* (사전 매핑) | security/compliance-frameworks (사후 검증) |

→ chain: `compliance-strategy-agent` 설계 → 구현 → 배포 → `compliance-auditor` 정기 audit.

→ 두 agent를 **혼동하면 안 됨**. compliance-strategy는 "GDPR Art. 17 삭제 API 만들자"고 결정, compliance-auditor는 "삭제 API가 실제로 동작하는지 evidence 수집".

### vs `security-scanner`

security-scanner는 *코드 보안 취약점* (SQL injection, XSS, secret leak). compliance-strategy-agent는 *규제 매핑 / 설계 결정*. 두 agent 모두 보안 영역이지만 layer 다름.

### vs `business-decision-agent`

business-decision-agent는 *Provider 선택* (Kakao vs Google). compliance-strategy-agent는 *동의 흐름 요구사항* (어느 동의 항목 필수). compliance-blueprint가 먼저 produce되면 business-decision-agent의 ADR이 그것을 반영해야 한다.

### vs `architect-agent`

architect-agent는 *data-model / service-boundary*. compliance-strategy-agent는 *data 처리에 대한 규제 제약*. compliance-blueprint → architect-agent.inputs.

---

## Anti-Patterns

- ❌ "MVP 끝나고 GDPR 추가하자" → 5-10x 비용. Data Subject Rights API를 사후 retrofit하려면 전체 데이터 모델 변경
- ❌ 카드번호 직접 저장 → PCI-DSS SAQ D, 연간 audit 비용 폭증. Token-first 절대 우회 금지
- ❌ 위치정보를 일반 동의에 포함 → 한국 위치정보법 위반. *별도* 동의 필수
- ❌ 14세 미만 가입 허용 + 보호자 동의 흐름 없음 → PIPA + COPPA 동시 위반
- ❌ Audit log 사후 추가 → 도입 직후 6개월 데이터가 audit 불가능
- ❌ compliance-strategy로 *audit 보고서* 작성 시도 → 그건 compliance-auditor의 역할

