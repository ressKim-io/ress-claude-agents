## 5. Workflow 실행

`bootstrap-new-saas.yml` stage 2 (`compliance-baseline`)에서 호출됨. **architect-agent보다 먼저** 실행되어야 한다 (데이터 모델 결정에 영향).

**Input**:
- `mvp-scope` (product-engineer로부터)
- `geo-target` (external input — 한국 / EU / 미국 / 글로벌 / hybrid)
- 사용자 segment (B2C / B2B / 어린이 포함 등)

**Output**:
- `adr` (보통 1-3개 — Compliance scope + Data residency + Breach notification policy)
- `compliance-blueprint` (geo별 built-in 요구사항 + 금지 사항 + Audit evidence 위임)

**Handoff**:
- `compliance-blueprint` → `architect-agent` (data-model 설계 시 제약 반영)
- `compliance-blueprint` → `business-decision-agent` (auth/payment ADR에서 동의 흐름 반영)
- `adr` → `compliance-auditor` (배포 후 정기 audit 시 evidence 수집 기반)

