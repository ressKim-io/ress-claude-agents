## 3. PCI-DSS — Token-First Design

결제 카드 입력이 발생하면 PCI-DSS 적용. **scope 최소화 (Token-first)** 가 핵심.

```
사용자 카드 입력 → PG (PortOne/Toss/Stripe) 직접 토큰화
       ↓
우리 서버는 *토큰만* 저장 (카드번호 절대 저장 안 함)
       ↓
PCI scope = "토큰 저장 시스템"만. PCI-DSS SAQ A 또는 SAQ A-EP 적용 가능
```

→ 카드번호를 직접 받으면 PCI-DSS SAQ D (Level 1) 적용 → 비용 폭증.
→ 모든 한국/글로벌 PG가 Token-first 지원. 절대 우회 금지.

`business/payment-integration.md` skill의 Token-first 패턴과 정합.

