## Output Format

```markdown
## Compliance Blueprint — <프로젝트명>

### Scope
- geo: kr (1차) / global (2026 Q4 EU 진출 예정)
- user: B2C, 16세+ 한정 (14세 미만 미수용)
- data: PII + 결제 + behavior (위치정보 X)

### Applicable Regulations
- PIPA (한국 개인정보 보호법) — *현재 1순위*
- 정보통신망법 (마케팅 동의)
- PCI-DSS SAQ A (Token-first, 카드번호 미저장)
- GDPR (EU 진출 시점 — 2026 Q4 재평가)

### Built-in Design Requirements
1. 가입 시 consent flow:
   - 필수: TOS, Privacy Policy, 14세 이상 확인
   - 선택: 마케팅 수신, 제3자 제공
2. Data Subject Rights API (Art. 15-22 + PIPA 35-36):
   - GET /api/me/data, POST /export, DELETE /api/me
3. Token-first 결제 (PCI scope 최소화)
4. Audit log: 개인정보 처리 이력 3년 보존
5. Breach notification runbook: 24h (PIPA) / 72h (GDPR 시점)
6. Withdraw consent → 즉시 알림 중단 (`notification-multichannel` 연동)

### Forbidden
- 카드번호 직접 저장
- 14세 미만 가입
- 동의 없는 마케팅 발송
- 위치정보 (현재 scope 외)

### Handoff
- architect-agent: data-model 설계 시 위 요구사항 반영
- business-decision-agent: auth ADR에 PIPA consent 매핑, payment ADR에 Token-first 강제
- compliance-auditor: 배포 후 분기별 PIPA audit (evidence 수집 자동화)

### ADRs (별도 파일)
- ADR-C1: Compliance scope 정의
- ADR-C2: Data residency (AWS Seoul region 단일)
- ADR-C3: Breach notification 운영 (24h SLA)
```

