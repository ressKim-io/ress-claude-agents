## 4. 결정 매트릭스 — 한국 B2C SaaS 기본 시나리오

```yaml
project: <프로젝트명>
geo_target: kr
user_segment: b2c
data_categories:
  - personal: email, phone, name
  - payment: card_token (Token-first)
  - behavior: usage analytics
  - location: optional (위치 서비스 시)
  - children_under_14: forbid (14세 이상만)

required_built_in:
  - PIPA consent flow (가입 시)
  - PIPA consent withdrawal (1-click)
  - PIPA data export (Art. 35 열람권 대응)
  - PIPA breach notification (24h, runbook)
  - PCI-DSS Token-first (카드번호 미저장)
  - Audit log (개인정보 처리 이력)
  - Rate limiting (개인정보 조회 API)

forbidden:
  - 카드번호 직접 저장 (Token만)
  - 14세 미만 가입 (보호자 동의 인프라 없으면)
  - 위치정보 90일 초과 보관
  - 동의 없는 마케팅 발송

audit_evidence_collection:
  - "compliance-auditor 에게 handoff (배포 후 정기 audit)"
```

